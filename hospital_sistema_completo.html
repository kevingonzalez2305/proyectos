.hbtns{display:flex;gap:8px}
.btn{padding:6px 12px;border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}

.btn-danger{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}

.btn-success{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}

.kpi{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px}
.kpi-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.kpi-val{font-size:24px;font-weight:500;color:var(--color-text-primary);line-height:1}
.kpi-d{font-size:11px;margin-top:5px}
.du{color:var(--color-text-success)}.dd{color:var(--color-text-danger)}

.tbl{width:100%;border-collapse:collapse;table-layout:fixed}

function ini(n){return n.split(' ').slice(0,2).map(x=>x[0]).join('');}
function toast(msg,ok=true){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  const ic=document.getElementById('toast-icon');
  ic.className='ti '+(ok?'ti-check ts-ok':'ti-x ts-err');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

let curPage='dashboard';

function goPage(page,el){
  curPage=page;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  render(page);
}

function render(page){
  const mc=document.getElementById('main-content');
  if(page==='dashboard')mc.innerHTML=renderDashboard();
  else if(page==='pacientes')mc.innerHTML=renderPacientes();
  else if(page==='citas')mc.innerHTML=renderCitas();
  else if(page==='medicos')mc.innerHTML=renderMedicos();
  else if(page==='historial')mc.innerHTML=renderHistorial();
  else if(page==='farmacia')mc.innerHTML=renderFarmacia();
  else if(page==='laboratorio')mc.innerHTML=renderLab();
  else if(page==='hospitalizacion')mc.innerHTML=renderHosp();
  else if(page==='facturacion')mc.innerHTML=renderFacturacion();
  else if(page==='reportes')mc.innerHTML=renderReportes();
}

function renderDashboard(){
  const hosp=DB.patients.filter(p=>p.status==='Hospitalizado').length;
  const urg=DB.patients.filter(p=>p.status==='Urgente').length;
  const cPend=DB.citas.filter(c=>c.status==='Pendiente').length;
  return `
  <div class="page-head"><div><div class="page-title">Dashboard general</div><div class="page-sub">Domingo 24 de mayo de 2026 · Turno mañana</div></div>
  <div class="hbtns"><button class="btn" onclick="toast('Reporte impreso','true')"><i class="ti ti-printer" style="font-size:13px"></i>Imprimir</button></div></div>
  <div class="kpis">
    <div class="kpi"><div class="kpi-lbl"><i class="ti ti-users" style="font-size:13px;color:#185FA5"></i>Pacientes</div><div class="kpi-val">${DB.patients.length}</div><div class="kpi-d du"><i class="ti ti-trending-up" style="font-size:11px"></i> +3 este mes</div></div>
    <div class="kpi"><div class="kpi-lbl"><i class="ti ti-bed" style="font-size:13px;color:#3B6D11"></i>Hospitalizados</div><div class="kpi-val">${hosp}</div><div class="kpi-d du"><i class="ti ti-trending-up" style="font-size:11px"></i> +1 hoy</div></div>
    <div class="kpi"><div class="kpi-lbl"><i class="ti ti-calendar" style="font-size:13px;color:#BA7517"></i>Citas hoy</div><div class="kpi-val">${DB.citas.filter(c=>c.date==='2026-05-24').length}</div><div class="kpi-d pg-info">${cPend} pendientes</div></div>
    <div class="kpi"><div class="kpi-lbl"><i class="ti ti-alert-triangle" style="font-size:13px;color:#A32D2D"></i>Urgencias</div><div class="kpi-val">${urg}</div><div class="kpi-d dd"><i class="ti ti-trending-up" style="font-size:11px"></i> Atención inmediata</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="ch"><span class="ct">Actividad reciente</span><span class="pill pi">Hoy</span></div>
      <div class="bar-wrap">
        <div class="bar-lbl" style="width:100%;text-align:left;font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">Pacientes por servicio</div>
        ${['Cardiología','Neurología','Traumatología','Oncología','Pediatría','Urgencias'].map(d=>{
          const n=DB.patients.filter(p=>p.dept===d).length;
          const pct=Math.round(n/DB.patients.length*100);
          return `<div class="bar-row"><div class="bar-lbl">${d}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#378ADD"></div></div><div class="bar-num">${n}</div></div>`;
        }).join('')}
      </div>
      <div style="padding:0 14px 14px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-p" onclick="goPage('pacientes',document.querySelectorAll('.ni')[1])"><i class="ti ti-users" style="font-size:12px"></i>Ver pacientes</button>
        <button class="btn" onclick="goPage('citas',document.querySelectorAll('.ni')[2])"><i class="ti ti-calendar" style="font-size:12px"></i>Ver citas</button>
        <button class="btn" onclick="goPage('reportes',document.querySelectorAll('.ni')[9])"><i class="ti ti-chart-bar" style="font-size:12px"></i>Ver reportes</button>
      </div>
    </div>
    <div class="side-stack">
      <div class="card"><div class="ch"><span class="ct">Citas de hoy</span></div>
        ${DB.citas.filter(c=>c.date==='2026-05-24').map(c=>`
        <div class="ai"><div class="adot ${c.status==='Confirmada'?'dg':c.status==='Pendiente'?'da':'dr'}"></div>
        <div class="at">${c.time}</div><div><div class="an">${c.patient}</div><div class="ad">${c.dept}</div></div></div>`).join('')}
      </div>
      <div class="card"><div class="ch"><span class="ct">Alertas</span><span class="pill pd">Críticas</span></div>
        <div class="ali"><i class="ti ti-alert-triangle ali-icon" style="color:var(--color-text-danger)"></i><div><div class="ali-text">Pot. crítico — P-2841 UCI</div><div class="ali-time">Hace 5 min</div></div></div>
        <div class="ali"><i class="ti ti-pill ali-icon" style="color:var(--color-text-warning)"></i><div><div class="ali-text">Stock bajo: amoxicilina</div><div class="ali-time">Hace 18 min</div></div></div>
        <div class="ali"><i class="ti ti-test-pipe ali-icon" style="color:var(--color-text-info)"></i><div><div class="ali-text">Lab listo — Pérez, Ana</div><div class="ali-time">Hace 32 min</div></div></div>
      </div>
    </div>
  </div>`;
}

function renderPacientes(filter='',dept='',status=''){
  let data=DB.patients.filter(p=>{
    const q=filter.toLowerCase();
    return(!q||p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q)||p.dx.toLowerCase().includes(q))&&(!dept||p.dept===dept)&&(!status||p.status===status);
  });
  const rows=data.map(p=>{const c=pcolor(p.name);return`<tr>
    <td style="color:var(--color-text-secondary);font-size:11px">${p.id}</td>
    <td><div class="celln"><div class="pav" style="background:${c.bg};color:${c.tc}">${ini(p.name)}</div>${p.name}</div></td>
    <td>${p.age}a · ${p.sex}</td><td>${p.dept}</td><td>${p.dx}</td>
    <td><span class="pill ${SC[p.status]}">${p.status}</span></td>
    <td style="text-align:center">
      <span class="ract" title="Ver" onclick="viewPaciente('${p.id}')"><i class="ti ti-eye"></i></span>
      <span class="ract" title="Editar" onclick="editPaciente('${p.id}')"><i class="ti ti-edit"></i></span>
      <span class="ract" title="Eliminar" onclick="deletePaciente('${p.id}')"><i class="ti ti-trash"></i></span>
    </td></tr>`;}).join('')||`<tr><td colspan="7"><div class="empty-state"><i class="ti ti-mood-empty"></i>Sin resultados</div></td></tr>`;
  return`
  <div class="page-head"><div><div class="page-title">Pacientes</div><div class="page-sub">${DB.patients.length} registros totales</div></div>
  <div class="hbtns">
    <button class="btn" onclick="exportPacientes()"><i class="ti ti-download" style="font-size:12px"></i>Exportar CSV</button>
    <button class="btn btn-p" onclick="newPaciente()"><i class="ti ti-plus" style="font-size:12px"></i>Nuevo paciente</button>
  </div></div>
  <div class="card">
    <div class="srow">
      <input type="text" placeholder="Buscar nombre, ID, diagnóstico…" id="ps" oninput="render('pacientes');document.getElementById('ps').value=this.value" value="${filter}">
      <select id="pd" onchange="render('pacientes')"><option value="">Todos los servicios</option>${['Cardiología','Neurología','Traumatología','Pediatría','Oncología','Urgencias'].map(d=>`<option ${d===dept?'selected':''}>${d}</option>`).join('')}</select>
      <select id="pst" onchange="render('pacientes')"><option value="">Todos los estados</option>${['Activo','Hospitalizado','Alta','Urgente'].map(s=>`<option ${s===status?'selected':''}>${s}</option>`).join('')}</select>
    </div>
    <div style="overflow-x:auto"><table class="tbl"><colgroup><col style="width:60px"><col style="width:155px"><col style="width:60px"><col style="width:110px"><col style="width:125px"><col style="width:90px"><col style="width:70px"></colgroup>
    <thead><tr><th>ID</th><th>Paciente</th><th>Edad</th><th>Servicio</th><th>Diagnóstico</th><th>Estado</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>
    <div class="pg-bar"><span class="pg-info">Mostrando ${data.length} de ${DB.patients.length}</span>
    <div class="pg-btns"><button class="pgb on">1</button><button class="pgb">2</button><button class="pgb"><i class="ti ti-chevron-right" style="font-size:11px"></i></button></div></div>
  </div>`;
}

function renderCitas(){
  const rows=DB.citas.map(c=>`<tr>
    <td style="font-size:11px;color:var(--color-text-secondary)">${c.id}</td>
    <td>${c.patient}</td><td>${c.doctor}</td><td>${c.dept}</td>
    <td>${c.date} ${c.time}</td>
    <td><span class="pill ${SC2[c.status]}">${c.status}</span></td>
    <td style="text-align:center">
      <span class="ract" onclick="confirmCita('${c.id}')"><i class="ti ti-check"></i></span>
      <span class="ract" onclick="cancelCita('${c.id}')"><i class="ti ti-x"></i></span>
      <span class="ract" onclick="editCita('${c.id}')"><i class="ti ti-edit"></i></span>
    </td></tr>`).join('');
  return`<div class="page-head"><div><div class="page-title">Citas</div><div class="page-sub">${DB.citas.length} programadas</div></div>
  <div class="hbtns"><button class="btn btn-p" onclick="newCita()"><i class="ti ti-plus" style="font-size:12px"></i>Nueva cita</button></div></div>
  <div class="card">
  <div style="overflow-x:auto"><table class="tbl"><colgroup><col style="width:60px"><col style="width:140px"><col style="width:120px"><col style="width:100px"><col style="width:110px"><col style="width:90px"><col style="width:60px"></colgroup>
  <thead><tr><th>ID</th><th>Paciente</th><th>Médico</th><th>Servicio</th><th>Fecha/hora</th><th>Estado</th><th></th></tr></thead>
  <tbody>${rows}</tbody></table></div></div>`;
}

function renderMedicos(){
  const rows=DB.medicos.map(m=>{const c=pcolor(m.name);return`<tr>
    <td style="font-size:11px;color:var(--color-text-secondary)">${m.id}</td>
    <td><div class="celln"><div class="pav" style="background:${c.bg};color:${c.tc}">${ini(m.name)}</div>${m.name}</div></td>
    <td>${m.dept}</td><td>${m.esp}</td>
    <td><span class="pill ${SC3[m.status]}">${m.status}</span></td>

    <td style="text-align:center">
      <span class="ract" onclick="viewMedico('${m.id}')"><i class="ti ti-eye"></i></span>
      <span class="ract" onclick="editMedico('${m.id}')"><i class="ti ti-edit"></i></span>
    </td></tr>`;}).join('');
  return`<div class="page-head"><div><div class="page-title">Médicos</div><div class="page-sub">${DB.medicos.length} activos</div></div>

  <thead><tr><th>ID</th><th>Nombre</th><th>Servicio</th><th>Especialidad</th><th>Estado</th><th>Pacientes</th><th>Turno</th><th></th></tr></thead>

function renderHistorial(){
  return`<div class="page-head"><div><div class="page-title">Historiales clínicos</div><div class="page-sub">Busca un paciente para ver su historial</div></div></div>
  <div class="card">
    <div class="srow"><input type="text" id="hs" placeholder="Buscar paciente…"><button class="btn btn-p" onclick="buscarHistorial()"><i class="ti ti-search" style="font-size:12px"></i>Buscar</button></div>
    <div id="hist-result">
      <div class="empty-state"><i class="ti ti-file-medical"></i>Ingresa el nombre de un paciente para ver su historial clínico</div>
    </div>
  </div>`;
}

function buscarHistorial(){
  const q=document.getElementById('hs').value.toLowerCase();
  const p=DB.patients.find(p=>p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q));
  const el=document.getElementById('hist-result');
  if(!p){el.innerHTML=`<div class="empty-state"><i class="ti ti-mood-empty"></i>Paciente no encontrado</div>`;return;}
  const c=pcolor(p.name);
  el.innerHTML=`
  <div class="vc-head" style="background:var(--color-background-secondary)">
    <div class="vc-av" style="background:${c.bg};color:${c.tc}">${ini(p.name)}</div>
    <div><div style="font-size:13px;font-weight:500">${p.name}</div><div style="font-size:11px;color:var(--color-text-secondary)">${p.id} · ${p.dept}</div></div>
    <span class="pill ${SC[p.status]}" style="margin-left:auto">${p.status}</span>
  </div>
  <div class="vc-body">
    <div class="vrow"><span class="vl">Diagnóstico principal</span><span class="vv">${p.dx}</span></div>
    <div class="vrow"><span class="vl">Edad / Sexo</span><span class="vv">${p.age} años · ${p.sex==='F'?'Femenino':'Masculino'}</span></div>
    <div class="vrow"><span class="vl">Grupo sanguíneo</span><span class="vv">${p.blood}</span></div>
    <div class="vrow"><span class="vl">Teléfono</span><span class="vv">${p.phone}</span></div>
    <div class="vrow"><span class="vl">Email</span><span class="vv">${p.email}</span></div>
    <div class="vrow"><span class="vl">Primera consulta</span><span class="vv">${p.date}</span></div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-p" onclick="editPaciente('${p.id}')"><i class="ti ti-edit" style="font-size:12px"></i>Editar historial</button>
      <button class="btn" onclick="toast('Historial impreso')"><i class="ti ti-printer" style="font-size:12px"></i>Imprimir</button>
    </div>
  </div>`;
}

function renderFarmacia(){
  const items=DB.farmacia.map(f=>{
    const pct=Math.round(f.stock/f.max*100);
    const barColor=f.status==='Normal'?'#639922':f.status==='Bajo'?'#BA7517':'#A32D2D';
    return`<div class="farm-item">
      <div style="flex:1">
        <div class="farm-name">${f.name}</div>
        <div class="farm-det">${f.id} · ${f.stock}/${f.max} ${f.unit}</div>
        <div class="stock-bar" style="width:${pct}%;background:${barColor}"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-left:12px">
        <span class="pill ${SC4[f.status]}">${f.status}</span>
        <span class="ract" onclick="pedirFarmacia('${f.id}')"><i class="ti ti-plus"></i></span>
        <span class="ract" onclick="editFarmacia('${f.id}')"><i class="ti ti-edit"></i></span>
      </div>
    </div>`;}).join('');
  return`<div class="page-head"><div><div class="page-title">Farmacia</div><div class="page-sub">${DB.farmacia.filter(f=>f.status!=='Normal').length} medicamentos con stock bajo</div></div>
  <div class="hbtns">
    <button class="btn btn-danger" onclick="toast('Pedido de urgencia enviado')"><i class="ti ti-alert-triangle" style="font-size:12px"></i>Pedido urgente</button>
    <button class="btn btn-p" onclick="newFarmacia()"><i class="ti ti-plus" style="font-size:12px"></i>Agregar medicamento</button>
  </div></div>
  <div class="card">${items}</div>`;
}

function renderLab(){
  const rows=DB.lab.map(l=>`<tr>
    <td style="font-size:11px;color:var(--color-text-secondary)">${l.id}</td>
    <td>${l.patient}</td><td>${l.test}</td><td>${l.date}</td>
    <td><span class="pill ${SC5[l.status]}">${l.status}</span></td>
    <td>${l.result}</td>
    <td style="text-align:center">
      <span class="ract" onclick="viewLab('${l.id}')"><i class="ti ti-eye"></i></span>
      <span class="ract" onclick="editLab('${l.id}')"><i class="ti ti-edit"></i></span>
    </td></tr>`).join('');
  return`<div class="page-head"><div><div class="page-title">Laboratorio</div><div class="page-sub">${DB.lab.filter(l=>l.status==='Listo').length} resultados disponibles</div></div>

  <div class="card"><div style="overflow-x:auto"><table class="tbl">
  <thead><tr><th>ID</th><th>Paciente</th><th>Prueba</th><th>Fecha</th><th>Estado</th><th>Resultado</th><th></th></tr></thead>
  <tbody>${rows}</tbody></table></div></div>`;

  const libre=DB.camas.filter(c=>c.status==='Libre').length;
  const ocup=DB.camas.filter(c=>c.status==='Ocupada').length;
  const rows=DB.camas.map(c=>`<tr>
    <td style="font-weight:500">${c.id}</td><td>${c.planta}</td><td>${c.dept}</td>
    <td>${c.patient||'—'}</td><td>${c.desde||'—'}</td>
    <td><span class="pill ${SC6[c.status]}">${c.status}</span></td>
    <td style="text-align:center">
      <span class="ract" onclick="asignarCama('${c.id}')"><i class="ti ti-user-plus"></i></span>
      <span class="ract" onclick="liberarCama('${c.id}')"><i class="ti ti-logout"></i></span>
    </td></tr>`).join('');
  return`<div class="page-head"><div><div class="page-title">Hospitalización</div><div class="page-sub">${ocup} ocupadas · ${libre} disponibles</div></div></div>
  <div class="kpis">
    <div class="kpi"><div class="kpi-lbl"><i class="ti ti-bed" style="font-size:13px;color:#185FA5"></i>Total camas</div><div class="kpi-val">${DB.camas.length}</div></div>
    <div class="kpi"><div class="kpi-lbl" style="color:var(--color-text-danger)"><i class="ti ti-bed" style="font-size:13px"></i>Ocupadas</div><div class="kpi-val">${ocup}</div></div>
    <div class="kpi"><div class="kpi-lbl" style="color:var(--color-text-success)"><i class="ti ti-bed" style="font-size:13px"></i>Libres</div><div class="kpi-val">${libre}</div></div>
    <div class="kpi"><div class="kpi-lbl" style="color:var(--color-text-warning)"><i class="ti ti-bed" style="font-size:13px"></i>En limpieza</div><div class="kpi-val">${DB.camas.filter(c=>c.status==='Limpieza').length}</div></div>
  </div>
  <div class="card"><div style="overflow-x:auto"><table class="tbl">
  <thead><tr><th>Cama</th><th>Planta</th><th>Servicio</th><th>Paciente</th><th>Desde</th><th>Estado</th><th></th></tr></thead>
  <tbody>${rows}</tbody></table></div></div>`;
}

function renderFacturacion(){
  const total=DB.facturas.reduce((a,f)=>a+f.total,0);
  const pend=DB.facturas.filter(f=>f.status==='Pendiente').reduce((a,f)=>a+f.total,0);
  const rows=DB.facturas.map(f=>`<tr>
    <td style="font-size:11px;color:var(--color-text-secondary)">${f.id}</td>
    <td>${f.patient}</td><td>${f.concepto}</td><td>${f.fecha}</td>
    <td style="font-weight:500">$${f.total.toLocaleString()}</td>
    <td><span class="pill ${SC7[f.status]}">${f.status}</span></td>
    <td style="text-align:center">
      <span class="ract" onclick="pagarFactura('${f.id}')"><i class="ti ti-cash"></i></span>
      <span class="ract" onclick="imprimirFactura('${f.id}')"><i class="ti ti-printer"></i></span>
    </td></tr>`).join('');
  return`<div class="page-head"><div><div class="page-title">Facturación</div><div class="page-sub">${DB.facturas.length} facturas</div></div>
  <div class="hbtns"><button class="btn btn-p" onclick="newFactura()"><i class="ti ti-plus" style="font-size:12px"></i>Nueva factura</button></div></div>
  <div class="kpis">
    <div class="kpi"><div class="kpi-lbl"><i class="ti ti-cash" style="font-size:13px;color:#185FA5"></i>Total facturado</div><div class="kpi-val">$${total.toLocaleString()}</div></div>
    <div class="kpi"><div class="kpi-lbl" style="color:var(--color-text-warning)"><i class="ti ti-clock" style="font-size:13px"></i>Pendiente</div><div class="kpi-val">$${pend.toLocaleString()}</div></div>
    <div class="kpi"><div class="kpi-lbl" style="color:var(--color-text-success)"><i class="ti ti-check" style="font-size:13px"></i>Cobrado</div><div class="kpi-val">$${(total-pend).toLocaleString()}</div></div>
    <div class="kpi"><div class="kpi-lbl"><i class="ti ti-file" style="font-size:13px;color:#534AB7"></i>Facturas pendientes</div><div class="kpi-val">${DB.facturas.filter(f=>f.status==='Pendiente').length}</div></div>
  </div>
  <div class="card"><div style="overflow-x:auto"><table class="tbl">
  <thead><tr><th>ID</th><th>Paciente</th><th>Concepto</th><th>Fecha</th><th>Total</th><th>Estado</th><th></th></tr></thead>
  <tbody>${rows}</tbody></table></div></div>`;
}

function renderReportes(){
  const depts=['Cardiología','Neurología','Traumatología','Oncología','Pediatría','Urgencias'];
  return`<div class="page-head"><div><div class="page-title">Reportes</div><div class="page-sub">Estadísticas del sistema</div></div>
  <div class="hbtns"><button class="btn" onclick="toast('Reporte exportado')"><i class="ti ti-download" style="font-size:12px"></i>Exportar PDF</button></div></div>
  <div class="grid2">
    <div class="card"><div class="ch"><span class="ct">Pacientes por servicio</span></div>
    <div class="bar-wrap">
    ${depts.map(d=>{const n=DB.patients.filter(p=>p.dept===d).length;const pct=Math.round(n/DB.patients.length*100);
    return`<div class="bar-row"><div class="bar-lbl">${d}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#378ADD"></div></div><div class="bar-num">${n}</div></div>`;}).join('')}
    </div>
    <div class="ch" style="border-top:0.5px solid var(--color-border-tertiary);border-bottom:none"><span class="ct">Estado de pacientes</span></div>
    <div class="bar-wrap">
    ${['Activo','Hospitalizado','Alta','Urgente'].map(s=>{const n=DB.patients.filter(p=>p.status===s).length;const pct=Math.round(n/DB.patients.length*100);const col={Activo:'#639922',Hospitalizado:'#378ADD',Alta:'#888780',Urgente:'#A32D2D'}[s];

function updatePaciente(id){
  const p=DB.patients.find(x=>x.id===id);if(!p)return;
  p.name=formVal('ep-name');p.age=parseInt(formVal('ep-age'))||p.age;
  p.sex=formVal('ep-sex');p.dx=formVal('ep-dx');p.dept=formVal('ep-dept');
