<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuatro Patas — Inicio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>

<nav class="topbar">
  <a class="logo" href="index.html">🐾 Cuatro Patas</a>
  <nav>
    <a href="index.html" class="active"><i class="ti ti-layout-dashboard icon"></i><span>Inicio</span></a>
    <a href="pages/pacientes.html"><i class="ti ti-heart icon"></i><span>Pacientes</span></a>
    <a href="pages/consultas.html"><i class="ti ti-file-text icon"></i><span>Consultas</span></a>
  </nav>
</nav>

<main class="main">

  <div class="section-header">
    <h1>Panel principal</h1>
    <a href="pages/nuevo-paciente.html" class="btn btn-primary">
      <i class="ti ti-plus"></i> Nuevo paciente
    </a>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total pacientes</div><div class="stat-num" id="s-total">0</div></div>
    <div class="stat-card"><div class="stat-label">Perros (CAN)</div><div class="stat-num" id="s-can">0</div></div>
    <div class="stat-card"><div class="stat-label">Gatos (FEL)</div><div class="stat-num" id="s-fel">0</div></div>
    <div class="stat-card"><div class="stat-label">Consultas totales</div><div class="stat-num" id="s-consultas">0</div></div>
  </div>

  <div id="recordatorios-section" style="display:none;margin-bottom:24px">
    <h2 style="font-size:16px;font-weight:600;margin-bottom:14px"><i class="ti ti-bell"></i> Recordatorios</h2>
    <div id="recordatorios-list" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>

  <div class="section-header" style="margin-bottom:14px">
    <h2 style="font-size:16px;font-weight:600">Últimas consultas</h2>
    <a href="pages/pacientes.html" class="btn btn-secondary btn-sm">
      <i class="ti ti-plus"></i> Nueva consulta
    </a>
  </div>
  <div class="consult-list" id="recent"></div>

</main>
<div id="toast"></div>
<script src="js/db.js"></script>
<script>
  const s = DB.getStats();
  document.getElementById('s-total').textContent    = s.total;
  document.getElementById('s-can').textContent      = s.can;
  document.getElementById('s-fel').textContent      = s.fel;
  document.getElementById('s-consultas').textContent = s.consultas;

  /* ── Recordatorios ── */
  const todosRecordatorios = DB.getRecordatorios();
  const pendientes = todosRecordatorios.filter(r => r.vencido || r.esHoy);

  if (pendientes.length) {
    document.getElementById('recordatorios-section').style.display = 'block';
    document.getElementById('recordatorios-list').innerHTML = pendientes.map(r => `
      <div class="consult-item" style="border-left:3px solid ${r.vencido ? 'var(--red)' : 'var(--teal)'}">
        <div class="consult-date"><i class="ti ti-bell"></i> ${formatDate(r.fecha)}</div>
        <div>
          <div class="consult-patient">${petEmoji(r.tipo)} ${r.nombre} — ${r.motivo}</div>
          <div class="consult-reason">${r.nota || (r.vencido ? 'Recordatorio vencido' : 'Es hoy')}</div>
        </div>
        <span class="tag ${r.vencido ? '' : 'tag-teal'}" style="${r.vencido ? 'background:var(--red-light);color:var(--red)' : ''}">${r.vencido ? 'Vencido' : 'Hoy'}</span>
        <div class="consult-actions">
          <a href="pages/detalle-paciente.html?id=${r.pacienteId}" class="btn-icon" title="Ver paciente"><i class="ti ti-eye"></i></a>
        </div>
      </div>`).join('');
  }

  // Notificación nativa de Windows si hay recordatorios para hoy
  const deHoy = todosRecordatorios.filter(r => r.esHoy);
  if (deHoy.length && 'Notification' in window) {
    if (Notification.permission === 'granted') {
      lanzarNotificacion(deHoy);
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission().then(perm => {
        if (perm === 'granted') lanzarNotificacion(deHoy);
      });
    }
  }

  function lanzarNotificacion(lista) {
    const titulo = lista.length === 1
      ? `Recordatorio: ${lista[0].nombre}`
      : `Tienes ${lista.length} recordatorios hoy`;
    const cuerpo = lista.length === 1
      ? `${lista[0].motivo}${lista[0].nota ? ' — ' + lista[0].nota : ''}`
      : lista.map(r => `${r.nombre}: ${r.motivo}`).join(', ');
    new Notification(titulo, { body: cuerpo });
  }

  const recientes = DB.getAllConsultas().slice(0, 8);
  const cont = document.getElementById('recent');
  if (!recientes.length) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Sin consultas. Registra tu primer paciente.</p></div>`;
  } else {
    cont.innerHTML = recientes.map(c => `
      <div class="consult-item">
        <div class="consult-date"><i class="ti ti-calendar"></i> ${formatDate(c.fecha)}<br><span style="color:#aaa">${c.hora||''}</span></div>
        <div>
          <div class="consult-patient">${petEmoji(c.paciente.tipo)} ${c.paciente.nombre}</div>
          <div class="consult-reason">${c.motivo||'Sin motivo'}</div>
        </div>
        ${c.diagnostico ? `<span class="consult-diag">${c.diagnostico}</span>` : '<span></span>'}
        <div class="consult-actions">
          <a href="pages/detalle-paciente.html?id=${c.paciente.id}" class="btn-icon" title="Ver paciente"><i class="ti ti-eye"></i></a>
        </div>
      </div>`).join('');
  }
</script>
</body>
</html>
