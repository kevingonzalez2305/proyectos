<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuatro Patas — Consultas</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
<nav class="topbar">
  <a class="logo" href="../index.html">🐾 Cuatro Patas</a>
  <nav>
    <a href="../index.html"><i class="ti ti-layout-dashboard icon"></i><span>Inicio</span></a>
    <a href="pacientes.html"><i class="ti ti-heart icon"></i><span>Pacientes</span></a>
    <a href="consultas.html" class="active"><i class="ti ti-file-text icon"></i><span>Consultas</span></a>
  </nav>
</nav>
<main class="main">
  <div class="section-header">
    <h1>Todas las consultas</h1>
    <a href="pacientes.html" class="btn btn-primary"><i class="ti ti-plus"></i> Nueva consulta</a>
  </div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="🔍  Buscar por paciente, diagnóstico o MVZ…" oninput="render()">
    <input type="date" id="fdesde" onchange="render()" title="Desde">
    <input type="date" id="fhasta" onchange="render()" title="Hasta">
  </div>
  <div id="count" style="font-size:13px;color:var(--text-muted);margin-bottom:14px"></div>
  <div class="consult-list" id="list"></div>
</main>
<div id="toast"></div>
<script src="../js/db.js"></script>
<script>
  function render() {
    const q     = document.getElementById('search').value.toLowerCase();
    const desde = document.getElementById('fdesde').value;
    const hasta = document.getElementById('fhasta').value;

    // getAllConsultas ya viene aplanado con referencia al paciente
    let list = DB.getAllConsultas();
    if (q)     list = list.filter(c =>
      c.paciente.nombre?.toLowerCase().includes(q) ||
      (c.diagnostico||'').toLowerCase().includes(q) ||
      (c.mvz||'').toLowerCase().includes(q) ||
      (c.motivo||'').toLowerCase().includes(q));
    if (desde) list = list.filter(c => c.fecha >= desde);
    if (hasta) list = list.filter(c => c.fecha <= hasta);

    document.getElementById('count').textContent = `${list.length} consulta${list.length!==1?'s':''}`;
    const cont = document.getElementById('list');
    if (!list.length) {
      cont.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Sin resultados.</p></div>`;
      return;
    }
    cont.innerHTML = list.map(c => `
      <div class="consult-item">
        <div class="consult-date"><i class="ti ti-calendar"></i> ${formatDate(c.fecha)}<br><span style="color:#aaa;font-size:11px">${c.hora||''}</span></div>
        <div>
          <div class="consult-patient">${petEmoji(c.paciente.tipo)} ${c.paciente.nombre}</div>
          <div class="consult-reason">${c.motivo||'Sin motivo'}</div>
          ${c.mvz?`<div style="font-size:11px;color:var(--text-muted)">MVZ: ${c.mvz}</div>`:''}
        </div>
        ${c.diagnostico?`<span class="consult-diag">${c.diagnostico}</span>`:'<span></span>'}
        <div class="consult-actions">
          <a href="detalle-paciente.html?id=${c.paciente.id}" class="btn-icon" title="Ver expediente"><i class="ti ti-eye"></i></a>
          <button class="btn-icon" title="Eliminar" onclick="borrar('${c.paciente.id}','${c.id}')"><i class="ti ti-trash"></i></button>
        </div>
      </div>`).join('');
  }

  function borrar(pacienteId, cid) {
    if (!confirm('¿Eliminar esta consulta?')) return;
    DB.deleteConsulta(pacienteId, cid);
    showToast('Consulta eliminada');
    render();
  }

  render();
</script>
</body>
</html>
