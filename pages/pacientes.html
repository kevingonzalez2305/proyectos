<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuatro Patas — Pacientes</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
<nav class="topbar">
  <a class="logo" href="../index.html">🐾 Cuatro Patas</a>
  <nav>
    <a href="../index.html"><i class="ti ti-layout-dashboard icon"></i><span>Inicio</span></a>
    <a href="pacientes.html" class="active"><i class="ti ti-heart icon"></i><span>Pacientes</span></a>
    <a href="consultas.html"><i class="ti ti-file-text icon"></i><span>Consultas</span></a>
  </nav>
</nav>
<main class="main">
  <div class="section-header">
    <h1>Pacientes</h1>
    <a href="nuevo-paciente.html" class="btn btn-primary"><i class="ti ti-plus"></i> Nuevo paciente</a>
  </div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="🔍  Buscar por nombre, tutor o raza…" oninput="render()">
    <select id="ftipo" onchange="render()">
      <option value="">Todos</option>
      <option value="CAN">Perro (CAN)</option>
      <option value="FEL">Gato (FEL)</option>
    </select>
    <select id="forden" onchange="render()">
      <option value="reciente">Más reciente</option>
      <option value="nombre">Nombre A–Z</option>
    </select>
  </div>
  <div class="patients-grid" id="grid"></div>
</main>
<div id="toast"></div>
<script src="../js/db.js"></script>
<script>
  function render() {
    const q     = document.getElementById('search').value.toLowerCase();
    const tipo  = document.getElementById('ftipo').value;
    const orden = document.getElementById('forden').value;
    let list = DB.getAll();
    if (tipo)  list = list.filter(p => p.tipo === tipo);
    if (q)     list = list.filter(p =>
      p.nombre?.toLowerCase().includes(q) ||
      p.tutor?.toLowerCase().includes(q)  ||
      p.raza?.toLowerCase().includes(q));
    if (orden === 'nombre') list.sort((a,b) => a.nombre.localeCompare(b.nombre));
    const grid = document.getElementById('grid');
    if (!list.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🐾</div><p>Sin resultados.</p></div>`;
      return;
    }
    grid.innerHTML = list.map(p => `
      <a class="patient-card" href="detalle-paciente.html?id=${p.id}">
        <div class="card-top">
          <div class="card-avatar">${petEmoji(p.tipo)}</div>
          <div>
            <div class="card-name">${p.nombre}</div>
            <div class="card-breed">${p.raza||'Raza no registrada'}</div>
          </div>
        </div>
        <div class="tags">
          <span class="tag tag-${p.tipo.toLowerCase()}">${p.tipo}</span>
          ${p.edad    ? `<span class="tag tag-gray">${p.edad}</span>` : ''}
          ${p.sexo    ? `<span class="tag tag-gray">${p.sexo}</span>` : ''}
          ${p.esteril==='Si' ? `<span class="tag tag-teal">Esterilizado</span>` : ''}
        </div>
        <div class="card-meta">
          ${p.tutor ? `<span><i class="ti ti-user"></i> ${p.tutor}</span>` : ''}
          ${p.peso  ? `<span><i class="ti ti-scale"></i> ${p.peso} kg</span>` : ''}
          ${p.tel   ? `<span><i class="ti ti-phone"></i> ${p.tel}</span>` : ''}
          <span><i class="ti ti-file-text"></i> ${(p.consultas||[]).length} consulta(s)</span>
        </div>
      </a>`).join('');
  }
  render();
</script>
</body>
</html>
