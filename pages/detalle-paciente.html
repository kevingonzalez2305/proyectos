<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuatro Patas — Expediente</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/print.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
<nav class="topbar">
  <a class="logo" href="../index.html">🐾 Cuatro Patas</a>
  <nav>
    <a href="../index.html"><i class="ti ti-layout-dashboard icon"></i><span>Inicio</span></a>
    <a href="pacientes.html" class="active"><i class="ti ti-heart icon"></i><span>Pacientes</span></a>
    <a href="consultas.html"><i class="ti ti-file-text icon"></i><span>Consultas</span></a>
  </nav>
</nav>
<main class="main">
  <a class="back-btn" href="pacientes.html"><i class="ti ti-arrow-left"></i> Volver a pacientes</a>
  <div id="content">Cargando…</div>
  <div id="print-preview-bar" style="display:none;position:sticky;top:0;background:#fff7e6;border:1px solid #f0c97a;border-radius:var(--radius-md);padding:10px 16px;margin-bottom:14px;align-items:center;justify-content:space-between;z-index:50">
    <span style="font-size:13px"><i class="ti ti-eye"></i> Vista previa de impresión — revisa la hoja antes de imprimir</span>
    <div class="flex-row">
      <button class="btn btn-secondary btn-sm" onclick="cerrarVistaPrevia()"><i class="ti ti-x"></i> Cerrar</button>
      <button class="btn btn-primary btn-sm" onclick="window.print()"><i class="ti ti-printer"></i> Imprimir ahora</button>
    </div>
  </div>
  <div id="print-sheet"></div>
</main>
<div id="toast"></div>
<script src="../js/db.js"></script>
<script>
  const id = new URLSearchParams(location.search).get('id');

  function render() {
    const p = DB.getPatient(id);
    if (!p) { document.getElementById('content').innerHTML = '<p>Paciente no encontrado.</p>'; return; }

    const consultas = (p.consultas || []).slice().sort((a,b) => (b.fecha+b.hora).localeCompare(a.fecha+a.hora));

    const field = (lbl, val) => val ? `<div class="detail-meta-item"><strong>${lbl}:</strong> ${val}</div>` : '';

    const histHtml = consultas.length
      ? consultas.map(c => `
          <div class="hist-card">
            <div class="hist-top">
              <span class="hist-date"><i class="ti ti-calendar"></i> ${formatDate(c.fecha)} ${c.hora ? '· '+c.hora : ''}</span>
              ${c.diagnostico ? `<span class="hist-diag">${c.diagnostico}</span>` : ''}
            </div>
            <div class="hist-grid">
              ${c.motivo      ? `<div class="hist-field"><div class="hist-field-label">Motivo</div>${c.motivo}</div>` : ''}
              ${c.mvz         ? `<div class="hist-field"><div class="hist-field-label">MVZ</div>${c.mvz}</div>` : ''}
              ${(c.temp||c.hidrat||c.fccard||c.peso) ? `
                <div class="hist-field">
                  <div class="hist-field-label">Signos vitales</div>
                  ${[c.temp?'Temp: '+c.temp+'°C':'', c.hidrat?'Hidrat: '+c.hidrat+'%':'', c.fccard?'FC: '+c.fccard+' lpm':'', c.peso?'Peso: '+c.peso+' kg':''].filter(Boolean).join(' · ')}
                </div>` : ''}
              ${(c.mucosas||c.ganglios||c.oidos||c.ojos) ? `
                <div class="hist-field">
                  <div class="hist-field-label">Exploración</div>
                  ${[c.mucosas?'Mucosas: '+c.mucosas:'', c.ganglios?'Ganglios: '+c.ganglios:'', c.oidos?'Oídos: '+c.oidos:'', c.ojos?'Ojos: '+c.ojos:''].filter(Boolean).join(' · ')}
                </div>` : ''}
              ${c.pruebasSug  ? `<div class="hist-field"><div class="hist-field-label">Pruebas sugeridas</div>${c.pruebasSug}</div>` : ''}
              ${c.resultado   ? `<div class="hist-field"><div class="hist-field-label">Resultado</div>${c.resultado}</div>` : ''}
              ${c.tratClinica ? `<div class="hist-field"><div class="hist-field-label">Tratamiento clínica</div>${c.tratClinica}</div>` : ''}
              ${c.tratCasa    ? `<div class="hist-field"><div class="hist-field-label">Tratamiento casa</div>${c.tratCasa}</div>` : ''}
              ${c.revision    ? `<div class="hist-field" style="grid-column:1/-1"><div class="hist-field-label">Observaciones</div>${c.revision}</div>` : ''}
              ${c.receta      ? `<div class="hist-field"><div class="hist-field-label">No. Receta</div>${c.receta}</div>` : ''}
            </div>
            <div style="margin-top:10px;display:flex;justify-content:flex-end">
              <button class="btn btn-danger btn-sm" onclick="borrarConsulta('${c.id}')">
                <i class="ti ti-trash"></i> Eliminar consulta
              </button>
            </div>
          </div>`).join('')
      : `<div class="empty-state" style="padding:30px">
          <div class="empty-icon">📋</div>
          <p>Sin consultas. <a href="nuevo-paciente.html?id=${id}&tab=consulta">Registrar primera consulta</a>.</p>
        </div>`;

    document.getElementById('content').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h1 style="font-size:20px;font-weight:600">${petEmoji(p.tipo)} ${p.nombre}</h1>
        <div class="flex-row">
          <button class="btn btn-secondary btn-sm" onclick="imprimirFicha()"><i class="ti ti-printer"></i> Imprimir</button>
          <a href="nuevo-paciente.html?id=${p.id}" class="btn btn-secondary btn-sm"><i class="ti ti-edit"></i> Editar</a>
          <button class="btn btn-danger btn-sm" onclick="borrarPaciente()"><i class="ti ti-trash"></i> Eliminar</button>
        </div>
      </div>

      <div class="detail-hero">
        <div class="detail-avatar">${petEmoji(p.tipo)}</div>
        <div style="flex:1">
          <div class="detail-name">${p.nombre}</div>
          <div class="detail-sub">${[p.raza, p.tipo, p.edad].filter(Boolean).join(' · ')}</div>
          <div class="detail-meta-grid">
            ${field('Sexo',       p.sexo)}
            ${field('Peso',       p.peso ? p.peso+' kg' : '')}
            ${field('Color',      p.color)}
            ${field('Tutor',      p.tutor)}
            ${field('Teléfono',   p.tel)}
            ${field('Domicilio',  p.domicilio)}
            ${field('Vive',       p.vive)}
            ${field('Convive con',p.convive)}
            ${field('Condición',  p.condicion)}
          </div>
          <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
            <span class="tag tag-${p.tipo.toLowerCase()}">${p.tipo}</span>
            ${p.esteril  ==='Si'?'<span class="tag tag-teal">Esterilizado/a</span>':''}
            ${p.gestante ==='Si'?'<span class="tag tag-gray">Gestante</span>':''}
            ${p.lactando ==='Si'?'<span class="tag tag-gray">Lactando</span>':''}
            ${p.garrap   ==='Si'?'<span class="tag tag-teal">Antiparasitario</span>':''}
          </div>
        </div>
      </div>

      ${(p.vacuna||p.nutricion) ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">
        ${p.vacuna ? `<div class="form-card" style="margin-bottom:0">
          <div class="form-card-header"><i class="ti ti-vaccine icon"></i> Vacunas</div>
          <div class="form-card-body" style="font-size:14px">
            <strong>${p.vacuna}</strong>
            ${p.vacunaFecha ? '<br><span class="text-muted">Fecha: '+formatDate(p.vacunaFecha)+'</span>' : ''}
            ${p.desparasit  ? '<br><strong>Desparasitación:</strong> '+p.desparasit : ''}
          </div>
        </div>` : ''}
        ${p.nutricion ? `<div class="form-card" style="margin-bottom:0">
          <div class="form-card-header"><i class="ti ti-salad icon"></i> Nutrición</div>
          <div class="form-card-body" style="font-size:14px">
            <strong>${p.nutricion}</strong>
            ${p.frecuencia ? '<br><span class="text-muted">'+p.frecuencia+'</span>' : ''}
          </div>
        </div>` : ''}
      </div>` : ''}

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h2 style="font-size:16px;font-weight:600">
          Historial de consultas
          <span style="font-size:13px;font-weight:400;color:var(--text-muted)">(${consultas.length})</span>
        </h2>
        <a href="nuevo-paciente.html?id=${p.id}&tab=consulta" class="btn btn-primary btn-sm">
          <i class="ti ti-plus"></i> Nueva consulta
        </a>
      </div>
      <div id="hist">${histHtml}</div>
    `;
  }

  function imprimirFicha() {
    const p = DB.getPatient(id);
    if (!p) return;
    const consultas = (p.consultas || []).slice().sort((a,b) => (b.fecha+b.hora).localeCompare(a.fecha+a.hora));

    const row = (label, val) => `<span><span class="ps-label">${label}:</span> ${val || '—'}</span>`;

    const consultasHtml = consultas.length ? consultas.map(c => `
      <div class="ps-consulta">
        <div class="ps-consulta-head">
          <span>Consulta — ${formatDate(c.fecha)} ${c.hora || ''}</span>
          <span>${c.diagnostico ? 'Dx: ' + c.diagnostico : ''}</span>
        </div>
        <div class="ps-block">
          <div class="ps-cell-label">Motivo de consulta</div>
          <div class="ps-cell-val">${c.motivo || '—'}</div>
        </div>
        <div class="ps-grid">
          <div class="ps-cell"><div class="ps-cell-label">Temp</div><div class="ps-cell-val">${c.temp || '—'}</div></div>
          <div class="ps-cell"><div class="ps-cell-label">Hidrat</div><div class="ps-cell-val">${c.hidrat || '—'}</div></div>
          <div class="ps-cell"><div class="ps-cell-label">Fc cardiaca</div><div class="ps-cell-val">${c.fccard || '—'}</div></div>
          <div class="ps-cell"><div class="ps-cell-label">Fc resp</div><div class="ps-cell-val">${c.fcresp || '—'}</div></div>
        </div>
        <div class="ps-grid-3" style="display:grid">
          <div class="ps-cell"><div class="ps-cell-label">Mucosas</div><div class="ps-cell-val">${c.mucosas || '—'}</div></div>
          <div class="ps-cell"><div class="ps-cell-label">Ganglios</div><div class="ps-cell-val">${c.ganglios || '—'}</div></div>
          <div class="ps-cell"><div class="ps-cell-label">Ojos / oídos</div><div class="ps-cell-val">${[c.oidos, c.ojos].filter(Boolean).join(' · ') || '—'}</div></div>
        </div>
        <div class="ps-block">
          <div class="ps-cell-label">Tratamiento en clínica</div>
          <div class="ps-cell-val">${c.tratClinica || '—'}</div>
        </div>
        <div class="ps-block">
          <div class="ps-cell-label">Tratamiento en casa</div>
          <div class="ps-cell-val">${c.tratCasa || '—'}</div>
        </div>
        ${c.revision ? `<div class="ps-block"><div class="ps-cell-label">Observaciones</div><div class="ps-cell-val">${c.revision}</div></div>` : ''}
        <div class="ps-row" style="border-bottom:none">
          ${row('MVZ', c.mvz)} ${row('No. receta', c.receta)}
        </div>
      </div>
    `).join('') : '<p style="margin-top:10px">Sin consultas registradas.</p>';

    document.getElementById('content').style.display = 'none';
    document.getElementById('print-preview-bar').style.display = 'flex';
    document.getElementById('print-sheet').style.display = 'block';
    document.getElementById('print-sheet').innerHTML = `
      <div class="ps-header">
        <div>
          <div class="ps-clinic-name">Veterinaria Cuatro Patas</div>
          <div class="ps-clinic-sub">C. Sorichi 7804, Fracc. Roma · 656 681 2507</div>
        </div>
        <div class="ps-meta">
          <div>Fecha de impresión: ${formatDate(todayISO())}</div>
          <div class="ps-type-box">${p.tipo}</div>
        </div>
      </div>

      <div class="ps-row">
        ${row('Paciente', p.nombre)} ${row('Raza', p.raza)} ${row('Edad', p.edad)} ${row('Sexo', p.sexo)}
      </div>
      <div class="ps-row">
        ${row('Color / señas', p.color)} ${row('Peso', p.peso ? p.peso + ' kg' : '')}
      </div>
      <div class="ps-row">
        ${row('Tutor', p.tutor)} ${row('Tel', p.tel)}
      </div>
      <div class="ps-row">
        ${row('Domicilio', p.domicilio)}
      </div>
      <div class="ps-row">
        ${row('Convive con', p.convive)} ${row('Vive', p.vive)}
      </div>

      <div class="ps-section-title">Salud reproductiva y prevención</div>
      <div class="ps-grid-2">
        <div class="ps-cell"><div class="ps-cell-label">Gestante / Esteril / Lactando</div><div class="ps-cell-val">${p.gestante||'No'} / ${p.esteril||'No'} / ${p.lactando||'No'}</div></div>
        <div class="ps-cell"><div class="ps-cell-label">Garrapata / pulga</div><div class="ps-cell-val">${p.garrap || 'No'}</div></div>
      </div>
      <div class="ps-grid-2">
        <div class="ps-cell"><div class="ps-cell-label">Vacuna</div><div class="ps-cell-val">${p.vacuna || '—'} ${p.vacunaFecha ? '(' + formatDate(p.vacunaFecha) + ')' : ''}</div></div>
        <div class="ps-cell"><div class="ps-cell-label">Desparasitación</div><div class="ps-cell-val">${p.desparasit || '—'}</div></div>
      </div>

      ${(p.nutricion || p.enfermedades || p.piel) ? `
      <div class="ps-section-title">Nutrición y antecedentes</div>
      <div class="ps-block">
        ${p.nutricion    ? '<div class="ps-cell-label">Nutrición</div><div class="ps-cell-val">'+p.nutricion+(p.frecuencia?' — '+p.frecuencia:'')+'</div>' : ''}
        ${p.enfermedades ? '<div class="ps-cell-label" style="margin-top:6px">Enfermedades previas</div><div class="ps-cell-val">'+p.enfermedades+'</div>' : ''}
        ${p.piel         ? '<div class="ps-cell-label" style="margin-top:6px">Piel y faneras</div><div class="ps-cell-val">'+p.piel+'</div>' : ''}
      </div>` : ''}

      <div class="ps-section-title">Historial de consultas</div>
      ${consultasHtml}

      <div class="ps-footer">
        <div class="ps-sign-line">Firma del tutor</div>
        <div class="ps-sign-line">Firma del MVZ</div>
      </div>
    `;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cerrarVistaPrevia() {
    document.getElementById('content').style.display = '';
    document.getElementById('print-preview-bar').style.display = 'none';
    document.getElementById('print-sheet').style.display = 'none';
    document.getElementById('print-sheet').innerHTML = '';
  }


  function borrarPaciente() {
    const p = DB.getPatient(id);
    if (!confirm(`¿Eliminar a ${p?.nombre} y todas sus consultas?`)) return;
    DB.deletePatient(id);
    showToast('Paciente eliminado');
    setTimeout(() => { location.href = 'pacientes.html'; }, 800);
  }

  function borrarConsulta(cid) {
    if (!confirm('¿Eliminar esta consulta?')) return;
    DB.deleteConsulta(id, cid);
    showToast('Consulta eliminada');
    render();
  }

  render();
</script>
</body>
</html>
